# -------------------
# CONFIGMAP
# -------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  MESSAGE: "🔥 Version 2 - Updated by Ranjani 🚀"

---
# -------------------
# BACKEND DEPLOYMENT
# -------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: MESSAGE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MESSAGE

---
# -------------------
# BACKEND SERVICE
# -------------------
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# -------------------
# FRONTEND DEPLOYMENT
# -------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80

---
# -------------------
# FRONTEND SERVICE
# -------------------
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: NodePort
